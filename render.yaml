services:
  # ── Backend: FastAPI Docker Service ──
  - type: web
    name: packetlens-api
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    region: oregon

  # ── Frontend: React Static Site ──
  - type: web
    name: packetlens-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://packetlens-api.onrender.com
